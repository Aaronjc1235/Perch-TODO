<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- perch bar -->
  <rect x="3" y="20" width="26" height="3" rx="1.5" fill="black"/>
  <!-- bird body -->
  <ellipse cx="17" cy="14" rx="5.5" ry="4" fill="black"/>
  <!-- bird head -->
  <circle cx="21" cy="10.5" r="3.2" fill="black"/>
  <!-- tail feathers -->
  <ellipse cx="11" cy="16" rx="4" ry="2" fill="black" transform="rotate(-15 11 16)"/>
  <!-- beak -->
  <polygon points="23.5,9.5 27,11 23.5,12" fill="black"/>
  <!-- legs -->
  <rect x="15.5" y="20" width="1.5" height="3.5" rx="0.5" fill="black"/>
  <rect x="18" y="20" width="1.5" height="3.5" rx="0.5" fill="black"/>
</svg>
